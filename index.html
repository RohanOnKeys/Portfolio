<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>rohan</title>
    <meta name="description" content="personal portfolio for rohan">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="home-bg">
    <div class="site">
      <header class="topbar shell">
        <nav class="nav" aria-label="primary">
          <a class="interactive" aria-current="page" href="index.html">home</a>
          <a class="interactive" href="about.html">about</a>
          <a class="interactive" href="work.html">work</a>
          <a class="interactive" href="blog.html">blog</a>
          <a class="interactive" href="now.html">now</a>
        </nav>
      </header>
      <main class="shell index-main">
        <section class="landing-copy" aria-labelledby="home-title">
          <p class="kicker">who am i?</p>
          <h1 id="home-title">rohan</h1>
          <p class="lead">i build systems for browser agents<br>and fault tolerant network protocols.</p>
          <p class="lead quiet">i care about making interfaces easier to understand<br>before something automated decides to click through them.</p>
          <div class="external-links" aria-label="external links">
            <a class="interactive" href="https://github.com/RohanOnKeys">github</a>
            <a class="interactive" href="https://www.linkedin.com/in/rohan-pattanayak-a142a1284">linkedin</a>
            <a class="interactive" href="mailto:rohanpxquantum@gmail.com">email</a>
          </div>
        </section>
      </main>
    </div>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
      const nav = document.querySelector('.nav');
      const items = nav.querySelectorAll('.interactive');
      items.forEach(item => {
        item.addEventListener('mouseenter', () => {
          items.forEach(el => {
            if (el !== item) el.classList.add('shrink');
            else el.classList.remove('shrink');
          });
        });
        item.addEventListener('mouseleave', () => {
          items.forEach(el => el.classList.remove('shrink'));
        });
      });
    });
    </script>
  </body>
